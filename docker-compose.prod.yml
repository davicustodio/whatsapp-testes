services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://whatsapp-api-joaocat.duckdns.org/api}
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - api
